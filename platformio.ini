; ============================================================
;  ESP32 Hydroponics Governor — Native ESP-IDF
;  Board  : ESP32-WROOM-32 (4MB flash, 240MHz dual-core)
;  RTOS   : FreeRTOS (bundled in ESP-IDF, NOT Arduino wrapper)
;  Network: esp_wifi + esp_http_server + mdns (all native IDF)
; ============================================================

[env:esp32dev]
platform  = espressif32@^6.5.0   ; uses ESP-IDF 5.1.x
board     = esp32dev
framework = espidf

; ── Serial monitor ──────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Upload ──────────────────────────────────────────────────
upload_speed = 921600

; ── Partition table ─────────────────────────────────────────
board_build.partitions = partitions.csv

; ── Embedded HTML files ─────────────────────────────────────
; PlatformIO passes these to IDF's target_add_binary_data.
; In C, access via:
;   extern const uint8_t page_setup_html_start[] asm("_binary_page_setup_html_start");
;   extern const uint8_t page_setup_html_end[]   asm("_binary_page_setup_html_end");
board_build.embed_txtfiles =
    src/page_setup.html
    src/page_dash.html

; ── Build flags ─────────────────────────────────────────────
build_flags =
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO
