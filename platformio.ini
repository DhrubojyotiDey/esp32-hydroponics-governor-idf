; ============================================================
;  ESP32 Hydroponics Governor — Native ESP-IDF
;  Board  : ESP32-WROOM-32 (2 MB flash detected, 240 MHz dual-core)
;  RTOS   : FreeRTOS (bundled in ESP-IDF — NOT the Arduino wrapper)
;  Network: esp_wifi + esp_http_server + mdns (all native IDF)
;
;  PLUG-AND-PLAY QUICKSTART
;  ────────────────────────
;  1. Install VS Code + PlatformIO IDE extension
;  2. Clone repo:  git clone https://github.com/DhrubojyotiDey/esp32-hydroponics-governor-idf.git
;  3. Open the cloned folder in VS Code
;  4. PlatformIO auto-detects this file — click ✓ Build
;     (first build downloads the ESP-IDF 5.1.x toolchain ~500 MB)
;  5. Connect ESP32 → click → Upload
;
;  No Arduino framework, no third-party libraries, no manual IDF
;  setup required.  All dependencies are native ESP-IDF components
;  that ship with the toolchain.
; ============================================================

[env:final]
platform  = espressif32@^6.5.0   ; ships with ESP-IDF 5.1.x
board     = esp32dev              ; ESP32 board currently detected as 2 MB flash
framework = espidf

; ── Serial monitor ──────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Upload ──────────────────────────────────────────────────
upload_speed = 921600
; The bundled esptool no longer accepts the old forced erase-all upload flag.
; If you need a full erase, run: `pio run -t erase`
board_upload.flash_size = 2MB
; upload_port = COM7            ; uncomment + set if auto-detect picks wrong port
; upload_port = /dev/ttyUSB0   ; Linux / macOS

; ── Partition table ─────────────────────────────────────────
; Custom 2 MB single-app layout sized for the detected hardware.
board_build.partitions = partitions.csv

; ── SDK config overrides ─────────────────────────────────────
; PlatformIO merges sdkconfig.defaults into the generated sdkconfig
; on every clean build.  Edit sdkconfig.defaults, NOT sdkconfig.
; (sdkconfig is git-ignored so it is never committed)
board_build.sdkconfig = sdkconfig.defaults

; ── Extra Build Scripts ───────────────────────────────────────
extra_scripts = 
    pre:scripts/embed_html.py
    pre:scripts/erase_before_upload.py

; ── Build flags ─────────────────────────────────────────────
build_flags =
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO

; ── IDF component requirements ──────────────────────────────
; mdns is a managed component in ESP-IDF 5.x — declared in
; src/idf_component.yml and auto-downloaded by the IDF Component
; Manager on the first build. No manual steps needed.
;
; All other components used are core ESP-IDF (auto-included):
;   • freertos        — RTOS kernel
;   • esp_wifi        — WiFi (AP + STA + event loop)
;   • esp_http_server — HTTP + WebSocket server
;   • nvs_flash       — NVS credential storage
;   • esp_netif       — Network interface abstraction
;   • driver/gpio     — GPIO + ISR (DHT11, YF-S201)
;   • lwip            — TCP/IP stack (Telnet server sockets)
;   • app_update      — OTA partition management
; lib_deps =           ← intentionally empty (all native IDF)

; ── OTA via WiFi (optional) ─────────────────────────────────
; Once the device is on your network, upload over the air:
;   upload_protocol = espota
;   upload_port     = hydroponics.local   ; or device IP
