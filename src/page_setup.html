<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hydroponics Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background: radial-gradient(circle at top left, #1c2e22 0%, #0a0f0a 100%);
  color: #e2f0e2; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 1rem;
  overflow-x: hidden;
  overscroll-behavior-y: none;
  touch-action: manipulation;
}
.card{
  background: rgba(20, 35, 25, 0.4);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 2.2rem 1.8rem; width: 350px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5), inset 1px 1px 2px rgba(255,255,255,0.05);
  max-width: 100%;
  overflow: visible;
}
h2{
  color: #8fdca0; font-size: 1.25rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem;
  text-align: center;
  text-shadow: 0 0 8px rgba(143, 220, 160, 0.3);
}
label{
  display: block; font-size: 0.75rem; letter-spacing: 0.1em; color: #8fa892;
  margin-bottom: 0.4rem; text-transform: uppercase; font-weight: 500;
}
.fallback{
  font-size: 0.7rem; color: #8fa892; line-height: 1.6; margin-bottom: 1.5rem;
  padding: 0.6rem 0.8rem; background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.05); border-radius: 8px;
  text-align: center;
}
.fallback strong{color: #5dbb63}
.net-row{display:flex;gap:0.6rem;margin-bottom:0.4rem}
.net-box{position:relative;flex:1;min-width:0}
.net-sel, input{
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  color: #e2f0e2 !important; -webkit-text-fill-color: #e2f0e2 !important;
  padding: 0.8rem 1rem; font-family: inherit; font-size: 0.9rem;
  border-radius: 8px; cursor: pointer; outline: none; width: 100%;
  box-shadow: inset 2px 2px 6px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(255,255,255,0.03);
  transition: all 0.3s ease;
  display: flex; justify-content: space-between; align-items: center;
}
input::placeholder { color: #5a7a5a; -webkit-text-fill-color: #5a7a5a; }
input:focus, .net-sel.open { border-color: #5dbb63; box-shadow: inset 2px 2px 6px rgba(0,0,0,0.4), 0 0 8px rgba(93,187,99,0.3); }
.net-arrow{font-size: 0.7rem; color: #5dbb63; transition: transform 0.2s}
.net-sel.open .net-arrow{transform:rotate(180deg)}
.net-list{
  display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
  z-index:100;
  background: rgba(18, 30, 22, 0.95);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  max-height: min(46vh, 260px); overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  scrollbar-width: thin; scrollbar-color: rgba(143,220,160,0.45) rgba(0,0,0,0.18);
}
.net-list::-webkit-scrollbar{width:10px}
.net-list::-webkit-scrollbar-track{
  background: rgba(0,0,0,0.18); border-radius: 10px;
}
.net-list::-webkit-scrollbar-thumb{
  background: linear-gradient(180deg, rgba(143,220,160,0.75), rgba(79,163,85,0.75));
  border-radius: 10px; border: 2px solid rgba(18, 30, 22, 0.95);
}
.net-item{
  padding: 0.7rem 1rem; font-size: 0.85rem; color: #c0dac0; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.net-item:last-child{border-bottom:none}
.net-item:hover, .net-item:active{background: rgba(93,187,99,0.15); color: #8fdca0}
.net-empty{padding: 0.7rem 1rem; font-size: 0.8rem; color: #5a7a5a; font-style: italic}
@media (max-width: 480px){
  body{align-items:flex-start}
  .card{width:100%; padding: 1.5rem 1rem}
  .net-list{max-height:min(52vh, 320px)}
}
.pbar-wrap{
  margin: 0.4rem 0 1.2rem; height: 4px;
  background: rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden;
  box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
}
.pbar-fill{
  height:100%; width:0%;
  background: linear-gradient(90deg, #4fa355, #8fdca0);
  border-radius: 4px; transition: width 0.3s ease;
  box-shadow: 0 0 8px rgba(93,187,99,0.6);
}
@keyframes pbar-scan{0%{width:0%;opacity:1}80%{width:88%;opacity:1}100%{width:88%;opacity:0.5}}
.pbar-fill.scanning{animation: pbar-scan 2.5s ease-out forwards}
.pbar-fill.done{width:100%; transition: width 0.2s ease}
.rfsh{
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  color: #8fdca0; border-radius: 8px; cursor: pointer;
  padding: 0 0.8rem; flex-shrink: 0; font-size: 1.1rem;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.2), inset 1px 1px 2px rgba(255,255,255,0.05);
}
.rfsh:active{
  background: rgba(0,0,0,0.2);
  box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3);
  transform: translateY(1px);
}
@keyframes rfsh-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#rfsh-icon{display:inline-block; transform-origin:center; line-height:1}
#rfsh-icon.spinning{animation: rfsh-spin 0.7s ease-out}
#pw-wrap{display:none; margin-top: 0.8rem}
.pw-row{display:flex; gap:0.6rem; margin-bottom:0}
.pw-err{
  font-size: 0.7rem; color: #ff6b6b; min-height: 1rem;
  margin-top: 0.3rem; letter-spacing: 0.05em; font-weight: 500;
}
.btn{
  width:100%; color: #fff; padding: 0.9rem; font-family: inherit; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  font-size: 0.85rem; border-radius: 12px; margin-top: 1.2rem;
  background: linear-gradient(135deg, #4fa355 0%, #3a7a40 100%);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 4px 4px 10px rgba(0,0,0,0.4), -2px -2px 8px rgba(255,255,255,0.03), inset 1px 1px 2px rgba(255,255,255,0.2);
  transition: all 0.2s ease;
  display: flex; align-items: center; justify-content: center; gap: 0.6rem;
}
.btn:hover:not(:disabled) {
  background: linear-gradient(135deg, #5dbb63 0%, #45924d 100%);
  box-shadow: 0 0 15px rgba(93,187,99,0.4), 4px 4px 10px rgba(0,0,0,0.4);
}
.btn:active:not(:disabled) {
  box-shadow: inset 3px 3px 6px rgba(0,0,0,0.3), inset -1px -1px 2px rgba(255,255,255,0.1);
  transform: translateY(2px);
}
.btn:disabled{
  background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.05);
  color: #666; box-shadow: none; cursor: not-allowed;
}
.btn.complete{
  flex-direction: column; gap: 0.4rem; padding: 1.2rem;
  letter-spacing: 0.05em; text-transform: none; font-size: 0.85rem; line-height: 1.4;
  background: linear-gradient(135deg, #1d3324 0%, #0f1c14 100%);
  border-color: #5dbb63; box-shadow: 0 0 20px rgba(93,187,99,0.2);
}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{
  width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite; flex-shrink: 0; display: none;
}
.sp.on{display:inline-block}
#instbox{
  display: none; margin-top: 1rem; padding: 1rem;
  background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px; font-size: 0.75rem; color: #8fa892;
  line-height: 1.6; letter-spacing: 0.05em; text-align: center;
}
#instbox strong{color: #8fdca0; font-weight: 500}
</style>
</head>
<body>
<div class="card">
  <h2>WiFi Setup</h2>
  <div class="fallback">
    If this page closes, open <strong>http://192.168.4.1</strong> in your browser
  </div>

  <label>Available Networks</label>
  <div class="net-row">
    <div class="net-box">
      <div class="net-sel" id="net-sel" onclick="toggleDropdown()">
        <span class="net-sel-txt" id="net-sel-txt">Tap &#8635; to scan</span>
        <span class="net-arrow">&#9660;</span>
      </div>
      <div class="net-list" id="net-list"></div>
    </div>
    <button class="rfsh" id="rfsh" type="button" onclick="doScan()" title="Scan">
      <span id="rfsh-icon">&#8635;</span>
    </button>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbar"></div></div>

  <div id="pw-wrap">
    <label>Password</label>
    <div class="pw-row">
      <input type="password" id="pw" placeholder="Enter password" autocomplete="off">
      <button class="rfsh" type="button" onclick="togglePw()" title="Show/hide">&#128065;</button>
    </div>
    <div class="pw-err" id="pw-err"></div>
  </div>

  <button class="btn" id="cbtn" type="button" onclick="onSubmit()" disabled>
    <div class="sp" id="bsp"></div>
    <span id="btxt">SELECT A NETWORK FIRST</span>
  </button>

  <div id="instbox"></div>
</div>

<script>
var scanStatusTmr,pollTmr,keepAliveTmr,_ip='',_local='';
var _selSSID='',_selOpen=false,_dropOpen=false;
var _listTouchStartY=0;

function bars(r){
  if(r>=-50)return'\u2588\u2588\u2588\u2588';
  if(r>=-65)return'\u2588\u2588\u2588\u2591';
  if(r>=-75)return'\u2588\u2588\u2591\u2591';
  return'\u2588\u2591\u2591\u2591';
}
function enc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function togglePw(){
  var pw=document.getElementById('pw');
  pw.type=pw.type==='password'?'text':'password';
}
function setBar(state){
  var p=document.getElementById('pbar');
  p.className='pbar-fill';void p.offsetWidth;
  if(state==='scanning')p.classList.add('scanning');
  else if(state==='done')p.classList.add('done');
  else if(state==='error'){
    p.style.background='#ff4444';p.classList.add('done');
    setTimeout(function(){p.className='pbar-fill';p.style.background='';},800);
  }
}
function setBtn(text,spinning,disabled){
  var btn=document.getElementById('cbtn');
  var sp=document.getElementById('bsp');
  var tx=document.getElementById('btxt');
  btn.disabled=!!disabled;
  sp.className=spinning?'sp on':'sp';
  tx.textContent=text;
  if(!disabled)btn.onclick=onSubmit;
}
function spinRfsh(){
  var ic=document.getElementById('rfsh-icon');
  ic.classList.remove('spinning');void ic.offsetWidth;
  ic.classList.add('spinning');
  ic.addEventListener('animationend',function h(){
    ic.classList.remove('spinning');
    ic.removeEventListener('animationend',h);
  });
}
function toggleDropdown(){
  _dropOpen=!_dropOpen;
  document.getElementById('net-list').style.display=_dropOpen?'block':'none';
  document.getElementById('net-sel').classList.toggle('open',_dropOpen);
}
function closeDropdown(){
  _dropOpen=false;
  document.getElementById('net-list').style.display='none';
  document.getElementById('net-sel').classList.remove('open');
}
document.addEventListener('click',function(e){
  var box=document.getElementById('net-sel').parentElement;
  if(_dropOpen&&!box.contains(e.target))closeDropdown();
});
function bindListTouchIsolation(){
  var list=document.getElementById('net-list');
  if(!list || list._touchIsolated)return;
  list._touchIsolated=true;

  list.addEventListener('touchstart',function(e){
    if(e.touches && e.touches.length===1){
      _listTouchStartY=e.touches[0].clientY;
    }
  },{passive:true});

  list.addEventListener('touchmove',function(e){
    if(!e.touches || e.touches.length!==1)return;
    var currentY=e.touches[0].clientY;
    var deltaY=currentY-_listTouchStartY;
    var atTop=list.scrollTop<=0;
    var atBottom=list.scrollTop+list.clientHeight>=list.scrollHeight-1;

    if((atTop&&deltaY>0)||(atBottom&&deltaY<0)){
      e.preventDefault();
    }
  },{passive:false});
}
function startKeepAlive(){
  if(keepAliveTmr)return;
  keepAliveTmr=setInterval(function(){
    fetch('/keepalive',{cache:'no-store'}).catch(function(){});
  },4000);
}
function selectNet(el){
  _selSSID=el.getAttribute('data-ssid');
  _selOpen=el.getAttribute('data-open')==='true';
  document.getElementById('net-sel-txt').textContent=el.textContent.trim();
  console.log('wifi selected:',_selSSID,'open:',_selOpen);
  closeDropdown();
  afterSelect();
}
function afterSelect(){
  if(!_selSSID){
    document.getElementById('pw-wrap').style.display='none';
    setBtn('SELECT A NETWORK FIRST',false,true);
    return;
  }
  var pw=document.getElementById('pw');
  pw.placeholder=_selOpen?'Blank if no password':'Enter password';
  document.getElementById('pw-wrap').style.display='block';
  pw.focus();
  setBtn('CONNECT',false,false);
}
function doScan(){
  clearInterval(scanStatusTmr);
  spinRfsh();setBar('scanning');closeDropdown();
  document.getElementById('net-list').innerHTML='';
  document.getElementById('net-sel-txt').textContent='Scanning\u2026';
  _selSSID='';_selOpen=false;
  document.getElementById('pw-wrap').style.display='none';
  setBtn('SELECT A NETWORK FIRST',false,true);
  fetch('/scan').catch(function(){});
  scanStatusTmr=setInterval(function(){
    fetch('/scanstatus').then(function(r){return r.json();})
    .then(function(d){
      if(!d.scanning){clearInterval(scanStatusTmr);loadScan();}
    }).catch(function(){});
  },500);
}
function loadScan(){
  fetch('/scanresults').then(function(r){return r.json();})
  .then(function(data){
    data.sort(function(a,b){return b.rssi-a.rssi;});
    var list=document.getElementById('net-list');
    if(data.length===0){
      list.innerHTML='<div class="net-empty">No networks found \u2014 tap \u21BB to rescan</div>';
      document.getElementById('net-sel-txt').textContent='No networks found';
      setBar('error');
    } else {
      var html='';
      data.forEach(function(n){
        var lbl=bars(n.rssi)+'  '+enc(n.ssid)+(n.open?'  [OPEN]':'  \uD83D\uDD12');
        html+='<div class="net-item" data-ssid="'+enc(n.ssid)+'" data-open="'+n.open+'" onclick="selectNet(this)">'+lbl+'</div>';
      });
      list.innerHTML=html;
      bindListTouchIsolation();
      document.getElementById('net-sel-txt').textContent='-- Select network --';
      setBar('done');
      _dropOpen=true;
      document.getElementById('net-list').style.display='block';
      document.getElementById('net-sel').classList.add('open');
    }
  }).catch(function(){
    document.getElementById('net-sel-txt').textContent='Scan failed \u2014 tap \u21BB';
    setBar('error');
  });
}
function onSubmit(){
  if(!_selSSID)return;
  var pass=document.getElementById('pw').value;
  var errEl=document.getElementById('pw-err');
  errEl.textContent='';
  if(!_selOpen&&pass.length===0){errEl.textContent='Password required';document.getElementById('pw').focus();return;}
  if(!_selOpen&&pass.length<8){errEl.textContent='Min 8 characters';document.getElementById('pw').focus();return;}
  clearInterval(scanStatusTmr);
  console.log('connect button pressed for:',_selSSID);
  setBtn('Connecting\u2026',true,true);
  fetch('/save',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'s='+encodeURIComponent(_selSSID)+'&p='+encodeURIComponent(pass)+'&o='+(_selOpen?'1':'0')
  })
  .then(function(r){return r.json();})
  .then(function(d){if(d.status==='connecting')poll();else setBtn('CONNECT',false,false);})
  .catch(function(){setBtn('CONNECT',false,false);});
}
function poll(){
  pollTmr=setTimeout(function(){
    fetch('/status').then(function(r){return r.json();})
    .then(function(d){
      if(d.status==='connected'){
        setBtn('Obtaining IP\u2026',true,true);
        setTimeout(function(){
          setBtn('Provisioning\u2026',true,true);
          setTimeout(function(){
            setBtn('Preparing UI\u2026',true,true);
            pollDashReady();
          },1500);
        },1000);
      } else if(d.status==='failed'){
        setBtn('CONNECT',false,false);
        document.getElementById('pw-err').textContent='Wrong password or network unreachable';
        document.getElementById('pw').focus();
      } else {
        poll();
      }
    }).catch(function(){poll();});
  },2000);
}
function pollDashReady(){
  fetch('/dashready').then(function(r){return r.json();})
  .then(function(d){
    if(d.ready){
      _ip=d.ip||_ip;
      _local=d.local||'http://hydroponics.local';
      setBtn('UI Ready \u2714',false,true);
      setTimeout(function(){showComplete(_ip,_local);},800);
    } else {
      setTimeout(pollDashReady,1000);
    }
  }).catch(function(){setTimeout(pollDashReady,1000);});
}
function showComplete(ip,local){
  var btn=document.getElementById('cbtn');
  var sp=document.getElementById('bsp');
  var tx=document.getElementById('btxt');
  sp.className='sp';
  btn.disabled=false;
  btn.classList.add('complete');
  tx.textContent='Copy  '+local;
  btn.onclick=function(){
    doCopy(local);
    tx.textContent='Copied! \u2714';
    setTimeout(function(){
      tx.textContent='Closing portal...';
      fetch('/reboot', {method: 'POST'}).catch(function(){});
    }, 500);
  };
  var ib=document.getElementById('instbox');
  ib.innerHTML='Connect to <strong>'+enc(_selSSID)+'</strong>'
    +' &amp; visit <strong>'+local+'</strong>.'
    +'<br><span style="font-size:.6rem;color:#3a5a3a">'
    +'Fallback: <strong>http://'+ip+'</strong></span>';
  ib.style.display='block';
}
function doCopy(txt){
  if(navigator.clipboard)navigator.clipboard.writeText(txt);
  else{var t=document.createElement('textarea');t.value=txt;
       document.body.appendChild(t);t.select();
       document.execCommand('copy');document.body.removeChild(t);}
}
loadScan(); /* Use the ESP32's pre-boot scan to avoid dropping the AP! */
startKeepAlive();
</script>
</body></html>
