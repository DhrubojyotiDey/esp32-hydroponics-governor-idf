<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hydroponics</title>
  <style>
    :root {
      --bg: #1c2e22; --bg-alt: #0a0f0a;
      --card-bg: rgba(20, 35, 25, 0.45);
      --text: #e2f0e2; --text-muted: #8fa892;
      --accent: #5dbb63; --accent-hover: #45924d;
      --danger: #ff6b6b; --danger-hover: #ff4d4d;
      --border: rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background: radial-gradient(circle at top left, var(--bg) 0%, var(--bg-alt) 100%);
      color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh; padding: 1.5rem;
    }
    header{
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo{
      color: #8fdca0; font-size: 1.2rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      text-shadow: 0 0 10px rgba(143,220,160,0.3);
    }
    .ws-dot{
      width: 10px; height: 10px; border-radius: 50%; background: #3a5a3a;
      transition: all 0.3s ease; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
    }
    .ws-dot.live{background: var(--accent); box-shadow: 0 0 10px var(--accent), inset -1px -1px 3px rgba(0,0,0,0.2);}
    .ws-dot.err{background: var(--danger); box-shadow: 0 0 10px var(--danger);}
    
    .grid{
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem; margin-bottom: 2rem;
    }
    .card{
      background: var(--card-bg);
      backdrop-filter: blur(16px) saturate(160%); -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 1.8rem 1.5rem; position: relative; overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4), inset 1px 1px 2px rgba(255,255,255,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(0,0,0,0.5), inset 1px 1px 2px rgba(255,255,255,0.08); }
    .card::before{
      content:''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #4fa355, #8fdca0); opacity: 0.8;
    }
    .card-label{
      font-size: 0.75rem; letter-spacing: 0.15em; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 0.8rem; font-weight: 500;
    }
    .card-value{font-size: 2.8rem; color: #fff; line-height: 1; font-weight: 300; text-shadow: 0 4px 12px rgba(0,0,0,0.3);}
    .card-unit{font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; letter-spacing: 0.05em;}
    .card-status{font-size: 0.65rem; letter-spacing: 0.1em; margin-top: 1rem; text-transform: uppercase; font-weight: 600;}
    .card-status.alive{color: var(--accent)}
    .card-status.dead{color: var(--danger)}
    
    .health-row{display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem;}
    .badge{
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
      padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.2); box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3);
    }
    .badge.alive{border-color: rgba(93,187,99,0.3); color: var(--accent); background: rgba(93,187,99,0.1);}
    .badge.dead{border-color: rgba(255,107,107,0.3); color: var(--danger); background: rgba(255,107,107,0.1);}
    
    .footer{display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; padding-top: 1rem;}
    .btn{
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff;
      padding: 0.7rem 1.2rem; font-family: inherit; font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
      border-radius: 8px; transition: all 0.2s ease;
      box-shadow: 4px 4px 10px rgba(0,0,0,0.3), -2px -2px 6px rgba(255,255,255,0.02), inset 1px 1px 2px rgba(255,255,255,0.05);
    }
    .btn:hover{background: rgba(255,255,255,0.05); border-color: rgba(93,187,99,0.4); color: var(--accent); box-shadow: 0 0 15px rgba(93,187,99,0.2), 4px 4px 10px rgba(0,0,0,0.3);}
    .btn:active{box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4); transform: translateY(1px);}
    .btn.danger:hover{border-color: rgba(255,107,107,0.4); color: var(--danger); box-shadow: 0 0 15px rgba(255,107,107,0.2), 4px 4px 10px rgba(0,0,0,0.3);}
    .stat{font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.08em; margin-left: auto; text-transform: uppercase;}
    
    /* OTA panel */
    #ota-panel{
      display:none; margin-top: 1.5rem; padding: 1.5rem;
      background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: inset 2px 2px 8px rgba(0,0,0,0.3);
    }
    #ota-panel label{
      font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.1em;
      text-transform: uppercase; display: block; margin-bottom: 0.8rem; font-weight: 500;
    }
    #ota-file{
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text);
      padding: 0.7rem; font-family: inherit; font-size: 0.8rem;
      border-radius: 8px; width: 100%; margin-bottom: 1rem; outline: none; cursor: pointer;
    }
    #ota-file::file-selector-button {
      background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff;
      padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; margin-right: 1rem;
      font-weight: 500; transition: all 0.2s;
    }
    #ota-file::file-selector-button:hover { background: rgba(93,187,99,0.2); border-color: var(--accent); }
    #ota-progress{
      height: 6px; background: rgba(0,0,0,0.4); border-radius: 4px;
      overflow: hidden; display: none; margin-bottom: 0.8rem;
      box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
    }
    #ota-bar{
      height: 100%; width: 0%; background: linear-gradient(90deg, #4fa355, #8fdca0);
      border-radius: 4px; transition: width 0.2s; box-shadow: 0 0 8px rgba(93,187,99,0.5);
    }
    #ota-msg{font-size: 0.75rem; color: #8fdca0; letter-spacing: 0.05em; min-height: 1rem;}
  </style>
</head>
<body>
  <header>
    <span class="logo">&#9670; Hydroponics</span>
    <span class="ws-dot" id="wsdot" title="WebSocket"></span>
  </header>

  <div class="grid">
    <div class="card">
      <div class="card-label">Temperature</div>
      <div class="card-value" id="val-temp">--</div>
      <div class="card-unit">&deg;C &mdash; DHT11</div>
      <div class="card-status" id="st-dht">&#9675; waiting</div>
    </div>
    <div class="card">
      <div class="card-label">Humidity</div>
      <div class="card-value" id="val-hum">--</div>
      <div class="card-unit">% RH</div>
    </div>
    <div class="card">
      <div class="card-label">Water Flow</div>
      <div class="card-value" id="val-flow">--</div>
      <div class="card-unit">L / min &mdash; YF-S201</div>
      <div class="card-status" id="st-flow">&#9675; waiting</div>
    </div>
  </div>

  <div class="health-row" id="health-row"></div>

  <div class="footer">
    <button class="btn" onclick="toggleOTA()">OTA Update</button>
    <button class="btn danger" onclick="doReboot()">Restart Device</button>
    <span class="stat" id="stat">Connecting&hellip;</span>
  </div>

  <div id="ota-panel">
    <label>Firmware Binary (.bin)</label>
    <input type="file" id="ota-file" accept=".bin">
    <div id="ota-progress"><div id="ota-bar"></div></div>
    <div id="ota-msg"></div>
    <button class="btn" onclick="doOTA()" style="margin-top:.5rem">Upload &amp; Flash</button>
  </div>

  <script>
  var ws, wsDot=document.getElementById('wsdot'), statEl=document.getElementById('stat');

  function init(){
    ws=new WebSocket('ws://'+window.location.hostname+'/ws');

    ws.onopen=function(){
      wsDot.className='ws-dot live';
      statEl.textContent='LIVE';
    };

    ws.onmessage=function(e){
      var d;
      try{d=JSON.parse(e.data);}catch(x){return;}

      if(d.temp!==undefined) document.getElementById('val-temp').textContent=d.temp.toFixed(1);
      if(d.hum!==undefined)  document.getElementById('val-hum').textContent=d.hum.toFixed(1);
      if(d.flow!==undefined) document.getElementById('val-flow').textContent=d.flow.toFixed(2);

      /* Per-sensor inline status under cards */
      if(d.sensors){
        setSensorStatus('dht', d.sensors.dht, 'st-dht');
        setSensorStatus('flow',d.sensors.flow,'st-flow');
        buildHealthRow(d.sensors);
      }
    };

    ws.onclose=function(){
      wsDot.className='ws-dot err';
      statEl.textContent='RECONNECTING\u2026';
      setTimeout(init,2000);
    };
    ws.onerror=function(){ws.close();};
  }

  function setSensorStatus(name,alive,elId){
    var el=document.getElementById(elId);
    if(!el)return;
    el.className='card-status '+(alive?'alive':'dead');
    el.textContent=(alive?'\u25CF ':'\u25CB ')+name.toUpperCase()+(alive?' ONLINE':' OFFLINE');
  }

  function buildHealthRow(sensors){
    var row=document.getElementById('health-row');
    var html='';
    Object.keys(sensors).forEach(function(k){
      var a=sensors[k];
      html+='<span class="badge '+(a?'alive':'dead')+'">'
           +k.toUpperCase()+(a?' \u25CF':' \u25CB')+'</span>';
    });
    row.innerHTML=html;
  }

  function doReboot(){
    if(!confirm('Restart the device?'))return;
    ws.send('reboot');
    statEl.textContent='Rebooting\u2026';
  }

  function toggleOTA(){
    var p=document.getElementById('ota-panel');
    p.style.display=p.style.display==='block'?'none':'block';
  }

  function doOTA(){
    var f=document.getElementById('ota-file').files[0];
    if(!f){document.getElementById('ota-msg').textContent='Select a .bin file first.';return;}
    var msg=document.getElementById('ota-msg');
    var bar=document.getElementById('ota-bar');
    var prog=document.getElementById('ota-progress');
    prog.style.display='block';
    bar.style.width='0%';
    msg.textContent='Uploading\u2026';

    var xhr=new XMLHttpRequest();
    xhr.open('POST','/ota');
    xhr.upload.onprogress=function(e){
      if(e.lengthComputable){
        var pct=Math.round(e.loaded/e.total*100);
        bar.style.width=pct+'%';
        msg.textContent='Uploading\u2026 '+pct+'%';
      }
    };
    xhr.onload=function(){
      if(xhr.status===200){
        bar.style.width='100%';
        msg.textContent='Flash complete. Rebooting\u2026';
      } else {
        msg.textContent='OTA failed (HTTP '+xhr.status+')';
      }
    };
    xhr.onerror=function(){
      msg.textContent='Upload error.';
    };
    xhr.send(f);
  }

  window.onload=init;
  </script>
</body>
</html>
