<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mock Hydroponics Dashboard (Interactive UI Preview)</title>
  <style>
    :root {
      --bg: #e0e5ec;
      --text-main: #2d3748;
      --text-muted: #a0aec0;
      /* Neumorphic Shadows - Light Mode */
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      /* Vibrant Glows */
      --glow-temp: #ff7e5f;
      --glow-hum: #4facfe;
      --glow-flow: #43e97b;
      --dot-alive: #10b981;
      --dot-dead: #ef4444;
      --btn-danger: #fc8181;
    }
    
    [data-theme="dark"] {
      --bg: #272A2E;
      --text-main: #edf2f7;
      --text-muted: #718096;
      /* Neumorphic Shadows - Dark Mode */
      --shadow-light: #34383d;
      --shadow-dark: #1a1c1f;
      /* Adjusted Glows */
      --glow-temp: #ffb199;
      --glow-hum: #70c1ff;
      --glow-flow: #34d399;
      --dot-alive: #34d399;
      --btn-danger: #f87171;
    }
    
    * { 
      box-sizing: border-box; margin: 0; padding: 0; 
      transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease; 
    }
    
    body {
      background: var(--bg); color: var(--text-main);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; padding: 2rem 1.5rem;
      display: flex; flex-direction: column; align-items: center;
    }
    
    .container { width: 100%; max-width: 480px; }
    
    /* Neumorphic Core Mechanics */
    .neu-out {
      border-radius: 28px;
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
      background: var(--bg);
    }
    .neu-in {
      border-radius: 28px;
      box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
      background: var(--bg);
    }
    .neu-circle { border-radius: 50%; }

    /* Top Nav */
    nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3.5rem; }
    .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; }
    .ctrls { display: flex; align-items: center; gap: 1rem; }
    
    /* Neumorphic Theme Toggle Switch */
    .theme-toggle {
      width: 54px; height: 30px; border-radius: 15px; position: relative; cursor: pointer;
      box-shadow: inset 4px 4px 6px var(--shadow-dark), inset -4px -4px 6px var(--shadow-light);
    }
    .toggle-knob {
      width: 24px; height: 24px; border-radius: 50%; position: absolute; top: 3px; left: 3px;
      background: var(--bg); transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
    }
    [data-theme="dark"] .toggle-knob { left: 27px; }

    /* Connection Dot */
    .ws-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--dot-dead); 
              box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3), 0 0 10px var(--dot-dead); }
    .ws-dot.live { background: var(--dot-alive); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3), 0 0 10px var(--dot-alive); }

    /* Main Dashboard Layout */
    .dashboard { display: flex; flex-direction: column; gap: 2.5rem; align-items: center; }

    /* Circular Hero Component (Twin Metric) */
    .hero {
      width: 260px; height: 260px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative;
    }
    .hero::before {
      content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
      border-radius: 50%; border: 2px solid transparent;
      background-image: linear-gradient(var(--bg), var(--bg)), linear-gradient(135deg, var(--glow-temp), var(--glow-hum));
      background-origin: border-box; background-clip: content-box, border-box;
      opacity: 0.8; transition: opacity 0.4s;
    }
    [data-theme="dark"] .hero::before { opacity: 0.4; }
    
    .hero-top { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1.15; padding-top: 1rem; }
    .hero-divider { width: 90px; height: 1px; background: var(--text-muted); opacity: 0.2; margin: 0.2rem 0 0.4rem; z-index: 2;}
    .hero-bottom { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; flex: 1; padding-bottom: 1rem;}

    .val-main { font-size: 3.8rem; font-weight: 300; line-height: 1; position: relative; z-index: 2; color: var(--text-main); text-shadow: 2px 2px 8px rgba(0,0,0,0.05); }
    .val-sub { font-size: 1.8rem; font-weight: 400; line-height: 1; margin-top: 0.2rem; position: relative; z-index: 2; color: var(--text-main); }
    
    .lbl { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); position: relative; z-index: 2; margin-bottom: 0.2rem;}
    .lbl-super { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); position: relative; z-index: 2;}
    
    /* Metric Cards */
    .row { display: grid; grid-template-columns: 1fr; gap: 1.5rem; width: 100%; }
    .card { padding: 1.75rem; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .card .val { font-size: 2.2rem; font-weight: 400; margin: 0.5rem 0; color: var(--text-main); }
    .card .unit { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; }

    /* Glow Accents */
    .text-temp { color: var(--glow-temp); text-shadow: 0 0 16px rgba(255,126,95,0.4); }
    .text-hum { color: var(--glow-hum); text-shadow: 0 0 16px rgba(79,172,254,0.4); }
    .text-flow { color: var(--glow-flow); text-shadow: 0 0 16px rgba(67,233,123,0.4); }

    /* Sub-System Health Inset Track */
    .health-track { width: 100%; padding: 1rem 1.5rem; display: flex; justify-content: space-around; border-radius: 16px; }
    .sensor-node { display: flex; align-items: center; gap: 0.6rem; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; }
    .node-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dot-dead); 
                box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2), 0 0 6px rgba(239,68,68,0.5); }
    .node-dot.ok { background: var(--dot-alive); box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2), 0 0 6px rgba(16,185,129,0.5); }

    /* Actions */
    .actions { display: flex; gap: 1.5rem; width: 100%; margin-top: 0.5rem; }
    .btn {
      flex: 1; padding: 1.25rem 0; border: none; font-family: inherit; font-size: 0.8rem;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
      cursor: pointer; outline: none; text-align: center; user-select: none; border-radius: 16px;
    }
    .btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); color: var(--text-main); }
    .btn.danger { color: var(--btn-danger); }
    .btn.danger:active { color: #f87171; }

    /* Modal / OTA Update Panel */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(224, 229, 236, 0.5); 
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: none; justify-content: center; align-items: center; z-index: 100;
      opacity: 0; transition: opacity 0.3s;
    }
    [data-theme="dark"] .modal-overlay { background: rgba(39, 42, 46, 0.6); }
    .modal-overlay.open { display: flex; opacity: 1; }
    
    .modal-card { width: 85%; max-width: 360px; padding: 2.5rem 2rem; position: relative; border-radius: 32px; }
    .modal-card h3 { margin-bottom: 2rem; font-weight: 600; color: var(--text-main); text-align: center; }
    
    .file-input { width: 100%; padding: 1.25rem 1rem; margin-bottom: 1.5rem; font-size: 0.8rem; 
                  color: var(--text-muted); border: none; outline: none; border-radius: 12px; }
    
    .progress-track { height: 12px; width: 100%; margin-bottom: 1.5rem; overflow: hidden; display: none; border-radius: 6px; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--glow-hum), var(--glow-flow)); 
                    border-radius: 6px; transition: width 0.3s; }
                    
    #ota-msg { text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 1.5rem; min-height: 1.2rem; }
    
    .close-btn { position: absolute; top: 1.2rem; right: 1.5rem; font-size: 1.5rem; font-weight: 300; cursor: pointer; color: var(--text-muted); }
    .close-btn:hover { color: var(--text-main); }
    
    .btn-block { width: 100%; display: block; }
    
    #demo-banner {
      background: #10b981; color: white; text-align: center; font-weight: 700; padding: 0.4rem;
      letter-spacing: 0.05em; font-size: 0.8rem; border-radius: 4px; margin-bottom: 2rem;
    }
  </style>
</head>
<body data-theme="dark">
  <div class="container">
    <div id="demo-banner">LIVESTREAM OF MOCK TELEMETRY</div>
    <nav>
      <div class="brand">Hydroponics</div>
      <div class="ctrls">
        <div class="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Theme">
          <div class="toggle-knob"></div>
        </div>
        <div class="ws-dot live" id="wsdot" title="Live Connection"></div>
      </div>
    </nav>

    <div class="dashboard">
      <!-- Dual Thermostat Hero -->
      <div class="neu-out neu-circle hero">
        <div class="hero-top">
          <div class="lbl">Temperature</div>
          <div class="val-main text-temp" id="val-temp">--</div>
          <div class="lbl-super">&deg;C</div>
        </div>
        
        <div class="hero-divider"></div>
        
        <div class="hero-bottom">
          <div class="lbl-super">Humidity</div>
          <div class="val-sub text-hum"><span id="val-hum">--</span> <span style="font-size:0.8rem;color:var(--text-muted)">%RH</span></div>
        </div>
      </div>

      <!-- Data Row -->
      <div class="row">
        <div class="neu-out card">
          <div class="lbl">Water Flow</div>
          <div class="val text-flow" id="val-flow">--</div>
          <div class="unit">L / MIN</div>
        </div>
      </div>

      <!-- Health Bar Track -->
      <div class="neu-in health-track">
        <div class="sensor-node">DHT <div class="node-dot ok" id="st-dht"></div></div>
        <div class="sensor-node">FLOW <div class="node-dot ok" id="st-flow"></div></div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <div class="neu-out btn" onclick="openOTA()">System Update</div>
        <div class="neu-out btn danger" onclick="doReboot()">Reboot</div>
      </div>
    </div>
  </div>

  <!-- OTA Upgrade Panel -->
  <div class="modal-overlay" id="ota-modal">
    <div class="neu-out modal-card">
      <div class="close-btn" onclick="closeOTA()">&times;</div>
      <h3>Firmware Upgrade</h3>
      
      <input type="file" id="ota-file" accept=".bin" class="neu-in file-input">
      
      <div class="neu-in progress-track" id="ota-progress">
        <div class="progress-bar" id="ota-bar"></div>
      </div>
      
      <div id="ota-msg"></div>
      
      <div class="neu-out btn btn-block" onclick="doOTA()">Mock Flash Device</div>
    </div>
  </div>

  <script>
    // System Theme Engine
    const savedTheme = localStorage.getItem('hydro-theme');
    if (savedTheme) {
      document.body.setAttribute('data-theme', savedTheme);
    } else {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.setAttribute('data-theme', 'dark');
      }
    }

    function toggleTheme() {
      const current = document.body.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('hydro-theme', next);
    }

    // Modal Control
    function openOTA() { document.getElementById('ota-modal').classList.add('open'); }
    function closeOTA() { document.getElementById('ota-modal').classList.remove('open'); }

    // Mock Backend Telemetry Injection
    function updateMockData() {
        const temp = (28.5 + (Math.random() * 2.0 - 1.0)).toFixed(1);
        const hum = (58.0 + (Math.random() * 4.0 - 2.0)).toFixed(1);
        const flow = (0.24 + (Math.random() * 0.05 - 0.02)).toFixed(2);
        
        document.getElementById('val-temp').textContent = temp;
        document.getElementById('val-hum').textContent = hum;
        document.getElementById('val-flow').textContent = flow;
    }
    
    // Inject Mock Data every 1.5 seconds simulating Websocket Stream!
    setInterval(updateMockData, 1500);
    updateMockData();

    function doReboot() {
      if(confirm('Mock: Rebooting device physically?')) {
        alert("Board would now reboot!");
      }
    }

    function doOTA() {
      var msg = document.getElementById('ota-msg');
      var bar = document.getElementById('ota-bar');
      var prog = document.getElementById('ota-progress');
      
      prog.style.display='block'; 
      bar.style.width='0%'; 
      msg.textContent='Mock Flash Started...';
      
      let pct = 0;
      let ivi = setInterval(function(){
          pct += 5;
          bar.style.width = pct + '%';
          msg.textContent = 'Uploading: ' + pct + '%';
          
          if(pct >= 100) {
              clearInterval(ivi);
              msg.textContent='Flashing memory...'; 
              setTimeout(function(){ 
                   alert("OTA Flash Succeeded!"); 
                   closeOTA();
                   prog.style.display='none'; 
                   bar.style.width='0%'; 
                   msg.textContent='';
              }, 1500);
          }
      }, 100);
    }
  </script>
</body>
</html>
